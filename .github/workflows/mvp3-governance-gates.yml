name: MVP3 Governance Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  governance-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Release Gate
        run: npm run test:release:gate

      - name: Provenance Gate
        run: npm run test:provenance:gate
